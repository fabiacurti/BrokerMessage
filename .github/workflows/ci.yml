name: CI - Build, Test and Docker Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ─── JOB 1: BUILD & TEST .NET ──────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OrderProcessingSystem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore OrderProcessingSystem.sln

      - name: Build solution
        run: dotnet build OrderProcessingSystem.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test OrderProcessingSystem.sln --configuration Release --no-build --verbosity normal
        continue-on-error: true

  # ─── JOB 2: DOCKER BUILD ───────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build (imagens)
    runs-on: ubuntu-latest
    needs: build-and-test
    defaults:          # ← AQUI estava o bug: working-directory precisa estar dentro de defaults.run
      run:
        working-directory: OrderProcessingSystem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Build OrderApi
        run: docker build -t orderapi -f src/OrderApi/Dockerfile .

      - name: Build PaymentService
        run: docker build -t paymentservice -f src/PaymentService/Dockerfile .

      - name: Build InventoryService
        run: docker build -t inventoryservice -f src/InventoryService/Dockerfile .

      - name: Build NotificationService
        run: docker build -t notificationservice -f src/NotificationService/Dockerfile .

  # ─── JOB 3: DOCKER COMPOSE (smoke test) ────────────────────────────────────
  docker-compose-test:
    name: 🚀 Docker Compose (smoke test)
    runs-on: ubuntu-latest
    needs: docker-build
    defaults:
      run:
        working-directory: OrderProcessingSystem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Validate docker-compose config
        run: docker compose config

      - name: Start containers
        run: |
          docker compose up -d
          sleep 15
          docker ps

      - name: Check containers health
        run: |
          docker compose ps
          docker compose logs --tail=50

      - name: Stop containers
        if: always()
        run: docker compose down --volumes