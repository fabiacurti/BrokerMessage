name: CI - Build, Test and Docker Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ─── JOB 1: BUILD & TEST .NET ──────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OrderProcessingSystem

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4   # v4 já suporta Node 24
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore OrderProcessingSystem.sln

      - name: Build solution
        run: dotnet build OrderProcessingSystem.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test OrderProcessingSystem.sln --configuration Release --no-build --verbosity normal
        continue-on-error: true

  # ─── JOB 2: DOCKER BUILD ───────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build (imagens)
    runs-on: ubuntu-latest
    needs: build-and-test   # só roda se o build passar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Build OrderApi
        run: docker build -t orderapi ./OrderProcessingSystem/src/OrderApi

      - name: Build PaymentService
        run: docker build -t paymentservice ./OrderProcessingSystem/src/PaymentService

      - name: Build InventoryService
        run: docker build -t inventoryservice ./OrderProcessingSystem/src/InventoryService

      - name: Build NotificationService
        run: docker build -t notificationservice ./OrderProcessingSystem/src/NotificationService

  # ─── JOB 3: DOCKER COMPOSE (smoke test) ────────────────────────────────────
  docker-compose-test:
    name: 🚀 Docker Compose (smoke test)
    runs-on: ubuntu-latest
    needs: docker-build   # só roda se as imagens buildarem

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Validate docker-compose config
        working-directory: OrderProcessingSystem
        run: docker compose config

      - name: Start containers
        working-directory: OrderProcessingSystem
        run: |
          docker compose up -d
          sleep 15
          docker ps

      - name: Check containers health
        working-directory: OrderProcessingSystem
        run: |
          docker compose ps
          docker compose logs --tail=50

      - name: Stop containers
        if: always()
        working-directory: OrderProcessingSystem
        run: docker compose down --volumes