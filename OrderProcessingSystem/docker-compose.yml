services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: order-processing-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  order-api:
    build:
      context: .
      dockerfile: src/OrderApi/Dockerfile
    container_name: order-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_URLS: http://+:5000
      RabbitMQ:Host: rabbitmq
      RabbitMQ:Port: "5672"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - order-network
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService/Dockerfile
    container_name: payment-service
    environment:
      RabbitMQ:Host: rabbitmq
      RabbitMQ:Port: "5672"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - order-network
    restart: unless-stopped

  inventory-service:
    build:
      context: .
      dockerfile: src/InventoryService/Dockerfile
    container_name: inventory-service
    environment:
      RabbitMQ:Host: rabbitmq
      RabbitMQ:Port: "5672"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - order-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: src/NotificationService/Dockerfile
    container_name: notification-service
    environment:
      RabbitMQ:Host: rabbitmq
      RabbitMQ:Port: "5672"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - order-network
    restart: unless-stopped

volumes:
  rabbitmq_data:
    driver: local

networks:
  order-network:
    driver: bridge
