name: CI - Build, Test and Docker Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      # 3. Restore dependencies
      - name: Restore
        run: dotnet restore OrderProcessingSystem.sln

      # 4. Build solution
      - name: Build
        run: dotnet build OrderProcessingSystem.sln --configuration Release --no-restore

      # 5. Test (se existir)
      - name: Test
        run: dotnet test OrderProcessingSystem.sln --configuration Release --no-build
        continue-on-error: true

      # 6. Docker build (API + Services)
      - name: Build Docker images
        run: |
          docker build -t orderapi ./src/OrderApi
          docker build -t paymentservice ./src/PaymentService
          docker build -t inventoryservice ./src/InventoryService
          docker build -t notificationservice ./src/NotificationService

      # 7. Validar docker-compose
      - name: Validate docker-compose
        run: docker compose config

      # 8. Subir stack (teste de integração básico)
      - name: Start containers (smoke test)
        run: |
          docker compose up -d
          sleep 10
          docker ps

      # 9. Cleanup
      - name: Stop containers
        if: always()
        run: docker compose down